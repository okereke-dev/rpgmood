name: RPGMood
version: 1.0.0
main: com.ricardo.rpgmood.RPGMoodPlugin
api-version: '1.20'
author: Ricardo
softdepend: [PlaceholderAPI, WorldGuard]
commands:
  rpgmood:
    description: Main RPGMood commands
    usage: /rpgmood <reload|toggle|info>
  diary:
    description: Opens the player's adventure journal
    usage: /diary
    aliases: [diario]
    permission: rpgmood.player.diary
  emote:
    description: Plays a short ambient emote effect
    usage: /emote
    permission: rpgmood.player.emotes
permissions:
  rpgmood.admin:
    default: op
  rpgmood.player.diary:
    default: true
  rpgmood.player.toggle:
    default: true
  rpgmood.player.emotes:
    default: true
