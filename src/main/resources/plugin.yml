name: RPGMood
version: 1.15.0
main: com.okereke.rpgmood.RPGMoodPlugin
api-version: '26.1'
author: Okereke
softdepend: [PlaceholderAPI, squaremap]
commands:
  rpgmood:
    description: Main RPGMood commands
    usage: /rpgmood <menu|reload|toggle [titles|scoreboard]|info|leaderboard [deaths|zones|level]|achievements|zones [fav <name>]|level>
  diary:
    description: Opens the player's adventure journal
    usage: /diary
    aliases: [diario]
    permission: rpgmood.player.diary
  rpgmood-farm:
    description: RPGMood farming commands
    usage: /rpgmood-farm <season|crops|recipes [all]|animal list>
permissions:
  rpgmood.admin:
    default: op
  rpgmood.player.diary:
    default: true
  rpgmood.player.toggle:
    default: true
  rpgmood.player.leaderboard:
    default: true
  rpgmood.player.farming:
    default: true
    description: Grants all /rpgmood-farm subcommands (shorthand for the 4 nodes below)
    children:
      rpgmood.player.farming.season: true
      rpgmood.player.farming.crops: true
      rpgmood.player.farming.recipes: true
      rpgmood.player.farming.animal: true
  rpgmood.player.farming.season:
    default: true
  rpgmood.player.farming.crops:
    default: true
  rpgmood.player.farming.recipes:
    default: true
  rpgmood.player.farming.animal:
    default: true
  rpgmood.player.achievements:
    default: true
  rpgmood.player.zones:
    default: true
  rpgmood.player.level:
    default: true
