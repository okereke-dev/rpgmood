name: RPGMood
version: 1.7.1
main: com.okereke.rpgmood.RPGMoodPlugin
api-version: '1.20'
author: Okereke
softdepend: [PlaceholderAPI, WorldGuard]
commands:
  rpgmood:
    description: Main RPGMood commands
    usage: /rpgmood <menu|reload|toggle [titles]|info|leaderboard [deaths|zones|level]|achievements>
  diary:
    description: Opens the player's adventure journal
    usage: /diary
    aliases: [diario]
    permission: rpgmood.player.diary
  rpgmood-farm:
    description: RPGMood farming commands
    usage: /rpgmood-farm <season|crops|recipes [all]|animal list>
    permission: rpgmood.player.farming
permissions:
  rpgmood.admin:
    default: op
  rpgmood.player.diary:
    default: true
  rpgmood.player.toggle:
    default: true
  rpgmood.player.leaderboard:
    default: true
  rpgmood.player.farming:
    default: true
  rpgmood.player.achievements:
    default: true
