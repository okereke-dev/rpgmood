# ==========================================
#          RPGMood - General Configuration
# ==========================================

settings:
  zone_change_cooldown: 45
  particle_update_interval: 40

messages:
  no_permission: "&c[RPGMood] You do not have permission to use this command."
  plugin_reloaded: "&a[RPGMood] Configuration reloaded successfully."
  toggle_enabled: "&a[RPGMood] Effects enabled."
  toggle_disabled: "&e[RPGMood] Effects disabled."

mob_scaling:
  enabled: true
  hostile-only: true
  max-level: 40
  health_per_level: 2.0
  damage_per_level: 0.12
  armor_per_level: 0.25
  speed_per_level: 0.0015
  radius:
    step_distance: 180
  players_bonus_per_player: 1
  name_format: "&cLv. {level} {name}"
  base-levels:
    ZOMBIE: 1
    SKELETON: 2
    SPIDER: 2
    CREEPER: 3
    ENDERMAN: 4
    WITHER_SKELETON: 5
  biome-bonuses:
    PLAINS: 0
    FOREST: 1
    DARK_FOREST: 2
    DESERT: 1
    TAIGA: 2
    SNOWY_TAIGA: 2
    JUNGLE: 2
    SWAMP: 2
    MOUNTAINS: 3
    BADLANDS: 2
    NETHER_WASTES: 3
    SOUL_SAND_VALLEY: 4
    CRIMSON_FOREST: 3
    WARPED_FOREST: 3
  structure-bonuses:
    stronghold: 3
    desert_pyramid: 2
    jungle_pyramid: 2
    woodland_mansion: 4
    ocean_monument: 4
    nether_fortress: 3

death_messages:
  fallback:
    - "&7{player} met an untimely end."
    - "&7{player} learned that the wilds are not forgiving."
    - "&7{player} disappeared in a way the legends will murmur about."
    - "&7{player} became another lesson carved into the land."
  causes:
    entity:
      - "&6{player} was claimed by the wilderness near {location}."
      - "&6{player} got humbled by a hostile foe in {location}."
      - "&6{player} crossed paths with trouble and lost in {location}."
      - "&6{player} wandered into danger and paid for it in {location}."
      - "&6{player} learned the hard way that {location} is not safe tonight."
    fire:
      - "&6{player} turned into a cautionary tale."
      - "&6{player} got a little too close to the flames."
    fall:
      - "&6{player} discovered gravity is still undefeated."
      - "&6{player} fell with heroic confidence and poor judgment."
    void:
      - "&6{player} was swallowed by the void."
      - "&6{player} took a one-way trip to the abyss."
    explosion:
      - "&6{player} ended the adventure in a very explosive way."
    drowning:
      - "&6{player} learned that water is not a safe shortcut."
  biomes:
    plains:
      - "&8The plains watched {player} fall."
      - "&8The wind sighed as {player} disappeared from view."
      - "&8An unlucky step sent {player} to the ground."
    dark_forest:
      - "&8The dark forest kept its secrets, and {player} paid the price."
      - "&8Shadows moved in a way that {player} should not have ignored."
      - "&8{player} became another whisper among the trees."
    desert:
      - "&8The desert sun finished what the sand began for {player}."
      - "&8One more lost traveler collapsed in the heat."
      - "&8Dry winds and roving danger found {player}."
    taiga:
      - "&8The frozen wilds swallowed {player} whole."
      - "&8Ice and silence conspired against {player}."
      - "&8{player} froze into the landscape."
    snowy_taiga:
      - "&8The cold was merciless to {player}."
      - "&8Snow drifted over {player}'s last stand."
      - "&8Frost claimed another soul beneath the trees."
    jungle:
      - "&8The jungle claimed {player} in a very dramatic way."
      - "&8Lianas and danger closed around {player}."
      - "&8The roar of the leaves hid {player}'s final breath."
    swamp:
      - "&8The swamp took {player} as if it had been waiting all along."
      - "&8Murk and mire dragged {player} down."
      - "&8The bog kept another secret."
  killers:
    zombie:
      - "&c{player} was overwhelmed by a very rude {killer}."
      - "&c{player} met a {killer} with terrible manners."
      - "&c{player} let a {killer} prove it could dance better than them."
      - "&c{player} forgot that {killer}s are terrible conversationalists and got chewed out."
      - "&c{player} became a {killer}'s snack and a cautionary tale."
      - "&c{player} went for a bite of loot and found a {killer} bite first."
      - "&c{player} challenged a {killer} to a staring contest and regretted it."
      - "&c{player} tried to outrun a {killer} and failed spectacularly."
      - "&c{player} let a {killer} practice kicking."
      - "&c{player} became a {killer}'s newest fan club member."
    skeleton:
      - "&c{player} got shot down by a {killer} with terrible manners."
      - "&c{player} was outmatched by a {killer}."
      - "&c{player} underestimated a {killer}'s aim and lost."
      - "&c{player} learned that skelly archers do not miss."
      - "&c{player} thought bones were harmless until a {killer} proved them wrong."
      - "&c{player} got spooked by a {killer} and traded a heartbeat for a respawn."
      - "&c{player} was turned into a cautionary bone story."
      - "&c{player} didn't notice the {killer} until the arrow had already left."
      - "&c{player} lost a fight to a {killer} and a bad haircut."
      - "&c{player} got capped by a {killer} and then wondered why it still had teeth."
    spider:
      - "&c{player} was outmatched by a {killer} with no chill."
      - "&c{player} got tangled up with a {killer}."
      - "&c{player} met a {killer} who had been practicing parkour."
      - "&c{player} became the {killer}'s unexpected snack."
      - "&c{player} got webbed, flipped, and flattened."
      - "&c{player} found out that {killer}s are not into hugs."
      - "&c{player} learned why {killer}s have eight eyes and no mercy."
      - "&c{player} tried to swing like Spider-Man and only got silk."
      - "&c{player} didn't read the warning signs."
      - "&c{player} became a sticky story in the webs."
    creeper:
      - "&c{player} got a very personal lesson from a {killer}."
      - "&c{player} heard a hiss and then everything went boom."
      - "&c{player} tried to stare down a {killer} and the {killer} called the bluff."
      - "&c{player} left more than footprints."
      - "&c{player} made a new friend who really knows how to explode."
      - "&c{player} was spectacularly bad at playing hide-and-seek with a {killer}."
      - "&c{player} got a surprise demolition job."
      - "&c{player} learned why {killer}s are better at blowing up drama than building bridges."
      - "&c{player} tried to adopt a {killer} and the {killer} adopted their death."
      - "&c{player} discovered that a {killer}'s idea of a hug is very loud."
    enderman:
      - "&c{player} was teleported into a bad decision by a {killer}."
      - "&c{player} blinked, and the {killer} had already rearranged life."
      - "&c{player} got dragged into a dimensionally awkward moment."
      - "&c{player} tried to look away from a {killer} and the {killer} looked through them."
      - "&c{player} discovered that {killer}s do not negotiate well."
      - "&c{player} became an impromptu block donation."
      - "&c{player} learned that staring contests with {killer}s are a terrible idea."
      - "&c{player} went for a teleport trip and never came back."
      - "&c{player} found out that {killer}s have no sense of personal space."
      - "&c{player} became a cautionary tale about looking at tall, dark strangers."
