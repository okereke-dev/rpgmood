    - "The story of this defeat will echo."
    - "Even the bravest legends would think twice here."
    - "The land remembers every lost hero."
    - "This chapter ends badly for {player}."
    - "The beasts were not merciful tonight."
    - "Few will forget what happened at {location}."
    - "The night keeps its own score."
    - "Another name joins the list of the fallen."
    - "Somewhere, the wilds smiled."
    - "The journal writes itself in blood tonight."
