# ==========================================
#          RPGMood - General Configuration
# ==========================================

settings:
  zone_change_cooldown: 45
  particle_update_interval: 40

# Organic, permanently-persisted zone clusters — replaces the old fixed grid for "unclaimed"
# wilderness (see zones.yml for the curated zones checked first). A cluster is created once,
# the first time a player reaches a chunk with no existing zone, by flood-filling every
# already-loaded neighboring chunk that shares its biome — it never grows or shrinks after.
dynamic_zones:
  # Max chunks a single flood-fill will claim into one cluster (24x24 chunks ~= 384x384 blocks).
  max_cluster_chunks: 576
  # Minimum time between a single player's own cluster *creations*, in milliseconds. Only
  # gates creating a brand-new cluster for a never-before-seen chunk — looking up a chunk
  # that's already part of a known cluster is never throttled. Keeps fast traversal (elytra)
  # from flood-filling many times per second.
  creation_throttle_ms: 750

# Optional SquareMap integration (https://github.com/jpenilla/squaremap) — draws each zone
# cluster as a borderless, semi-transparent rectangle on the web map, colored by local danger,
# with the zone name shown on hover. No effect if SquareMap isn't installed.
square_map:
  layer_priority: 3
  zone_fill_opacity: 0.18

# Low-probability flavor sound played near each player, checked every ~1s (20 ticks): birds
# by day, eerie ambience by night. Purely cosmetic, no chat/action-bar message. Swap in your
# own sound keys (including resource-pack custom ones) freely.
ambient_sounds:
  enabled: true
  chance: 0.02
  day:
    - "entity.parrot.ambient"
  night:
    - "ambient.cave"

messages:
  # Delivery mode for ambient messages: CHAT (traditional) or ACTION_BAR (non-intrusive overlay, default)
  delivery: ACTION_BAR
  no_permission: "&c[RPGMood] You do not have permission to use this command."
  plugin_reloaded: "&a[RPGMood] Configuration reloaded successfully."
  toggle_enabled: "&a[RPGMood] Effects enabled."
  toggle_disabled: "&e[RPGMood] Effects disabled."
  # Player connection messages — replace vanilla chat join/quit messages entirely.
  # Supports {player}. Delivered like any other ambient message (respects each viewer's action-bar/chat preference).
  player_join: "&a→ {player} joined the world."
  player_join_first_time: "&6✨ {player} arrived for the very first time!"
  player_quit: "&7← {player} left the world."
  join_sound: "entity.player.levelup"
  join_first_time_sound: "ui.toast.challenge_complete"
  quit_sound: "entity.villager.no"

# Radial safe zone around world spawn — hostile mobs never naturally spawn within this
# distance, regardless of mob_scaling settings.
spawn_protection:
  enabled: true
  radius: 64

mob_scaling:
  enabled: true
  hostile-only: true
  max-level: 40
  # Health and damage are both scaled as a fraction of each mob's OWN vanilla stat (an
  # Enderman scales off its own base health, a Zombie off its own — not a flat number shared
  # by every mob type). At level 1, a mob is at early_game_fraction of vanilla in both health
  # and damage together; at parity_level, it's exactly vanilla-equivalent; beyond that it keeps
  # climbing at the same rate.
  early_game_fraction: 0.85
  parity_level: 8
  armor_per_level: 0.25
  speed_per_level: 0.0015
  # Hard cap on FOLLOW_RANGE after level scaling — pathfinding safety (never scan beyond this).
  follow_range_cap: 36
  # Progressive knockback resistance from min-level upward (Knockback II less effective).
  knockback_resist:
    min-level: 25
    per-level: 0.02
    max: 0.85
  # Light attack-speed bonus when the mob exposes ATTACK_SPEED (many monsters ignore it).
  attack_speed:
    min-level: 20
    per-level: 0.02
    max-bonus: 0.4
  # Smart aggro: sync scan every second; forced setTarget for high-level mobs (see SmartAggroTask).
  smart_aggro:
    enabled: true
    los-min-level: 15
    los-radius: 28
    omniscient-min-level: 30
    omniscient-radius: 36
    max-retargets-per-tick: 40
    cooldown-ticks: 40
  # Bow / crossbow aim by mob level (EntityShootBowEvent).
  archery:
    enabled: true
    clumsy-max-level: 7
    clumsy-spread: 0.35
    laser-min-level: 15
    predictive-min-level: 30
    arrow-speed: 1.6
    tracer-particles: true
  # Pack assist / archer kite / creeper fuse (Paper MobGoals + listeners).
  advanced_ai:
    enabled: true
    pack:
      min-level: 20
      radius: 20
      max-allies: 5
      chunk-cooldown-seconds: 3
    kite:
      min-level: 30
      keep-distance: 8
    creeper:
      min-level: 25
      # Max fuse ticks at min-level; shortens toward min-fuse as level rises.
      base-fuse-ticks: 30
      min-fuse-ticks: 12
      advance-while-ignited: true
  # Seasonal combat modifiers applied at spawn (uses SeasonManager).
  seasonal:
    enabled: true
    winter:
      armor-bonus: 2.0
      arrow-slowness-ticks: 40
      arrow-slowness-amplifier: 0
    autumn:
      swift-chance-bonus: 0.20
    summer:
      burn-chance: 0.35
      burn-ticks: 60
  # Extra flat level added to any mob computed between 13000-23000 ticks (vanilla night).
  night_bonus: 2
  # Extra flat level added to any mob computed while it's thundering in that world.
  thunder_bonus: 2
  radius:
    step_distance: 180
  players_bonus_per_player: 1
  name_format: "&cLv. {level} {name}"
  # Show floating name tags above scaled mobs (invasive, defaults to false — use particle auras instead)
  show_name_tags: false
  bonus_xp_per_level: 2
  announcement:
    enabled: true
    min-level: 25
    cooldown-seconds: 120
    message: "&c⚠ A Level {level} {name} has emerged in {biome}!"
  base-levels:
    ZOMBIE: 1
    SKELETON: 2
    SPIDER: 2
    CREEPER: 3
    ENDERMAN: 4
    WITHER_SKELETON: 5
    # Bosses start well above parity_level so they only get buffs, never the early-game nerf.
    ELDER_GUARDIAN: 14
    WITHER: 18
    WARDEN: 20
  biome-bonuses:
    PLAINS: 0
    FOREST: 1
    DARK_FOREST: 2
    DESERT: 1
    TAIGA: 2
    SNOWY_TAIGA: 2
    JUNGLE: 2
    SWAMP: 2
    MOUNTAINS: 3
    BADLANDS: 2
    DEEP_DARK: 5
    NETHER_WASTES: 3
    SOUL_SAND_VALLEY: 4
    CRIMSON_FOREST: 3
    WARPED_FOREST: 3
  structure-bonuses:
    stronghold: 3
    desert_pyramid: 2
    jungle_temple: 2
    woodland_mansion: 4
    ocean_monument: 4
    fortress: 3
    ancient_city: 5
  # RPG-flavored mob modifiers rolled at spawn on top of numeric scaling — see the Mob Affix
  # System. Chance bands pick the highest threshold at or below the mob's level.
  affixes:
    enabled: true
    max-per-mob: 2
    warning-radius: 12
    chance-by-level:
      "10": 0.08
      "20": 0.20
      "30": 0.35
      "40": 0.50
    second-affix-chance-by-level:
      "20": 0.03
      "30": 0.10
      "40": 0.20
    roster:
      SWIFT:
        speed-bonus-pct: 25
        speed-bonus-pct-elite: 40
      BLEEDING:
        proc-chance: 0.25
        tick-damage-pct: 0.30
        duration-ticks: 100
      POISONOUS:
        proc-chance: 0.25
        duration-ticks: 100
      REGENERATING:
        armor-toughness-bonus: 2
      CHILLING:
        proc-chance: 0.30
        duration-ticks: 60

# ==========================================
#   RPGMood - Narrative Death Messages v2
#   Zelda-inspired style: clear + humorous
# ==========================================
# Colour scheme:
#   &4 (dark red)  — ⚰ icon + killer/cause name
#   &c (red)       — action verb + player name
#   &7 (gray)      — humorous flavour/quip (in quotes)
#   &e (yellow)    — PvP-specific tone
#
# Each death generates a message in one of these formats:
#   &4⚰ &cPlayer was slain by &4Zombie &7"But they wanted brains."
#   &4⚰ &cPlayer fell into the void &7"Nothing lasts forever."
#   &4⚰ &cPlayer was defeated by &4Steve &7"A worthy opponent."

death_messages:
  # ── Action verbs by damage cause ──
  # Picked randomly from the matching list. The {killer} placeholder
  # is only available in "entity" context.
  actions:
    entity:
      - "was slain by"
      - "was taken by"
      - "fell to"
      - "was claimed by"
      - "could not escape"
      - "was ambushed by"
      - "was overwhelmed by"
      - "was hunted by"
      - "got wrecked by"
      - "was destroyed by"
    fire:
      - "burned to death"
      - "was consumed by flames"
      - "got too close to the fire"
      - "was cooked alive"
      - "went out in a blaze"
      - "became a cautionary tale"
    fall:
      - "fell from a great height"
      - "misjudged the landing"
      - "forgot to look down"
      - "discovered gravity exists"
      - "had a date with the ground"
      - "learned about terminal velocity"
    void:
      - "fell into the void"
      - "was swallowed by the abyss"
      - "drifted into nothingness"
      - "was claimed by the void"
      - "took a one-way trip to nowhere"
      - "became one with the nothing"
    explosion:
      - "was blown up"
      - "got caught in the blast"
      - "misunderstood the situation"
      - "exploded dramatically"
      - "had a bang-up time"
    drowning:
      - "drowned"
      - "ran out of air"
      - "swam too deep"
      - "forgot to breathe"
      - "became fish food"
      - "rested at the bottom"
    unknown:
      - "met an untimely end"
      - "was lost to the world"
      - "vanished from this realm"
      - "left the adventure behind"

  # ── Humorous quips by killer type (shown in quotes) ──
  flavours:
    zombie:
      - "They wanted brains."
      - "Should have run faster."
      - "Zombie 1, Hero 0."
      - "The undead horde grows."
      - "Brains: the ultimate treasure."
      - "Should have brought more swords."
    skeleton:
      - "That aim was too clean."
      - "Bones don't miss."
      - "Skelly sharpshooter strikes again."
      - "Arrows: 1, Armor: 0."
      - "Calcified revenge."
      - "Remember kids: always zigzag."
    spider:
      - "Eight legs, zero mercy."
      - "Spiders don't negotiate."
      - "Should have burned the forest."
      - "Webbed and dead."
      - "Arachnophobia level: 100."
    creeper:
      - "Hiss... boom."
      - "Should have backed away."
      - "That was personal."
      - "Creepers gonna creep."
      - "SSSSssssBOOM."
      - "The last thing you hear."
    enderman:
      - "You looked. Big mistake."
      - "They don't like eye contact."
      - "Should have minded your business."
      - "Staring contest lost."
      - "Teleporting tantrum."
    player:
      - "A worthy opponent."
      - "The strong survive."
      - "Better luck next time."
      - "Spawn camp incoming."
      - "Revenge is brewing..."
    wolf:
      - "Never run with a pack."
      - "Good boy... bad situation."
      - "Fetch is a dangerous game."
      - "Loyal to the end. Their end."
    piglin:
      - "Gold > Your life."
      - "Should have traded peacefully."
      - "Brute force wins again."
    blaze:
      - "Hot stuff."
      - "Should have brought a bucket."
      - "Fire hazard warning."
    ghast:
      - "Tears of pain."
      - "Not so cute now, huh?"
      - "Fireball to the face."
    default:
      - "Game Over."
      - "Even heroes fall."
      - "The world keeps turning."
      - "You'll get 'em next time."
      - "The legend continues..."
      - "This is fine."

  # ── Environmental quips (no specific killer) ──
  environmental_flavours:
    fire:
      - "Slightly crispy."
      - "Fire: 1, Player: 0."
      - "Hot stuff."
      - "Well done. Literally."
      - "Some like it hot. Not you."
    fall:
      - "Gravity waits for no hero."
      - "The ground hits back."
      - "Wind shear is a thing."
      - "Ouch."
      - "Yep, that's a drop."
    void:
      - "Nothing lasts forever."
      - "Lost to the dark."
      - "The abyss blinks first."
      - "No return from here."
      - "Into the great unknown."
    explosion:
      - "That was impressive."
      - "Big bada boom."
      - "Overkill? Maybe."
      - "Boom goes the player."
      - "TNT meets destiny."
    drowning:
      - "Water: the eternal foe."
      - "Should have learned to swim."
      - "Bubbles tell the story."
      - "Aquaman lied to you."
      - "Downward spiral."
    default:
      - "The wilds are unforgiving."
      - "Fate is not always kind."
      - "Another soul wanders on."
      - "The adventure pauses."
      - "C'est la vie."

  # ── PvP-specific action verbs ──
  pvp_actions:
    - "was defeated by"
    - "was bested by"
    - "lost to"
    - "fell in combat to"
    - "was outplayed by"
    - "could not match"
    - "got humbled by"
