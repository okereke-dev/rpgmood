name: Publish to Hangar

on:
  release:
    types: [published]

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build with Maven
        run: mvn package -q

      - name: Publish to Hangar
        env:
          HANGAR_TOKEN: ${{ secrets.HANGAR_TOKEN }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          RELEASE_BODY: ${{ github.event.release.body }}
        run: |
          AUTH_RESPONSE=$(curl -s -X POST \
            "https://hangar.papermc.io/api/v1/authenticate?apiKey=$HANGAR_TOKEN" \
            -H "User-Agent: rpgmood-ci")
          echo "Auth response: $AUTH_RESPONSE"
          JWT=$(echo "$AUTH_RESPONSE" | jq -r '.token')
          echo "JWT prefix: ${JWT:0:20}..."

          # Written to a file and referenced via -F versionUpload=@file rather than inlined,
          # so curl's own -F syntax (which treats ";" as a field-metadata separator) can't
          # be broken by punctuation in the release notes.
          jq -n \
            --arg version "$RELEASE_TAG" \
            --arg changelog "$RELEASE_BODY" \
            '{
              version: $version,
              pluginDependencies: { PAPER: [] },
              platformDependencies: {
                PAPER: ["1.20.4"]
              },
              description: $changelog,
              files: [{ fileInfo: null, externalUrl: null, platforms: ["PAPER"] }],
              channel: "Release"
            }' > hangar-payload.json

          UPLOAD_RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}" -X POST \
            "https://hangar.papermc.io/api/v1/projects/okereke-dev/RPGMood/upload" \
            -H "Authorization: HangarAuth $JWT" \
            -H "User-Agent: rpgmood-ci" \
            -F "versionUpload=@hangar-payload.json;type=application/json" \
            -F "files=@target/rpgmood.jar;type=application/java-archive")
          echo "Upload response: $UPLOAD_RESPONSE"
          HTTP_STATUS=$(echo "$UPLOAD_RESPONSE" | grep "HTTP_STATUS" | cut -d: -f2)
          if [ "$HTTP_STATUS" -lt 200 ] || [ "$HTTP_STATUS" -ge 300 ]; then
            echo "Upload failed with HTTP $HTTP_STATUS"
            exit 1
          fi
